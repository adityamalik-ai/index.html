<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Command Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0a0c10;
    --surface:  #111318;
    --surface2: #181b22;
    --border:   #252933;
    --accent:   #f0a500;
    --accent2:  #e05c2a;
    --green:    #2ecc71;
    --red:      #e74c3c;
    --blue:     #3498db;
    --purple:   #9b59b6;
    --text:     #e8eaf0;
    --muted:    #5a6070;
    --font-display: 'Syne', sans-serif;
    --font-mono:    'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(240,165,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,165,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.1rem; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }
  #last-updated {
    font-size: .7rem; color: var(--muted);
    letter-spacing: .05em;
  }
  #refresh-btn {
    background: none; border: 1px solid var(--border);
    color: var(--accent); font-family: var(--font-mono);
    font-size: .75rem; padding: 6px 14px; border-radius: 4px;
    cursor: pointer; letter-spacing: .05em;
    transition: all .2s;
  }
  #refresh-btn:hover { background: var(--accent); color: var(--bg); }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative; z-index: 1;
    max-width: 1440px; margin: 0 auto;
    padding: 28px 32px 60px;
  }

  /* ── PAGE TITLE ── */
  .page-title {
    font-family: var(--font-display);
    font-size: 2rem; font-weight: 800;
    color: var(--text); margin-bottom: 4px;
  }
  .page-sub {
    font-size: .72rem; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── LOADING / ERROR ── */
  #loader {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 60vh; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: .8rem; color: var(--muted); letter-spacing: .1em; }

  #error-box {
    display: none;
    background: rgba(231,76,60,.08); border: 1px solid var(--red);
    border-radius: 8px; padding: 20px 24px;
    font-size: .85rem; color: var(--red); margin-bottom: 24px;
    line-height: 1.6;
  }

  #dashboard { display: none; }

  /* ── KPI STRIP ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative; overflow: hidden;
    animation: fadeUp .4s ease both;
  }
  .kpi-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.total::after   { background: var(--accent); }
  .kpi-card.done::after    { background: var(--green); }
  .kpi-card.progress::after{ background: var(--blue); }
  .kpi-card.overdue::after { background: var(--red); }
  .kpi-card.todo::after    { background: var(--purple); }
  .kpi-card.high::after    { background: var(--accent2); }

  .kpi-label {
    font-size: .65rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .12em;
    margin-bottom: 10px;
  }
  .kpi-value {
    font-family: var(--font-display);
    font-size: 2.4rem; font-weight: 800;
    line-height: 1;
  }
  .kpi-card.total   .kpi-value { color: var(--accent); }
  .kpi-card.done    .kpi-value { color: var(--green); }
  .kpi-card.progress .kpi-value{ color: var(--blue); }
  .kpi-card.overdue .kpi-value { color: var(--red); }
  .kpi-card.todo    .kpi-value { color: var(--purple); }
  .kpi-card.high    .kpi-value { color: var(--accent2); }

  /* ── PROGRESS BAR ── */
  .progress-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px;
    margin-bottom: 24px;
    animation: fadeUp .4s .1s ease both;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .progress-title { font-family: var(--font-display); font-size: .9rem; font-weight: 700; }
  .progress-pct { font-size: 1.4rem; font-weight: 700; color: var(--green); font-family: var(--font-display); }
  .progress-track {
    height: 8px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--green), #27ae60);
    transition: width 1s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── CHARTS ROW ── */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px; margin-bottom: 24px;
  }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px;
    animation: fadeUp .4s .15s ease both;
  }
  .chart-title {
    font-family: var(--font-display);
    font-size: .8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .chart-title::before {
    content: ''; width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px; flex-shrink: 0;
  }
  .chart-wrap { position: relative; height: 200px; }

  /* ── DATA TABLE ── */
  .table-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    animation: fadeUp .4s .2s ease both;
  }
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 12px;
  }
  .table-title {
    font-family: var(--font-display);
    font-size: .85rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .1em;
    display: flex; align-items: center; gap: 8px;
  }
  .table-title::before {
    content: ''; width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
  }
  .table-controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono);
    font-size: .72rem; padding: 6px 12px; border-radius: 4px; cursor: pointer;
    outline: none;
  }
  .filter-select:focus { border-color: var(--accent); }
  #search-input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono);
    font-size: .72rem; padding: 6px 12px; border-radius: 4px;
    outline: none; width: 180px;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  thead th {
    padding: 12px 16px; text-align: left;
    font-size: .65rem; text-transform: uppercase;
    letter-spacing: .1em; color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 12px 16px; vertical-align: middle; }

  /* ── BADGES ── */
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 99px;
    font-size: .65rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; white-space: nowrap;
  }
  .badge-done, .badge-complete, .badge-completed, .badge-closed { background: rgba(46,204,113,.15); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
  .badge-progress, .badge-in-progress, .badge-inprogress, .badge-active, .badge-ongoing { background: rgba(52,152,219,.15); color: var(--blue); border: 1px solid rgba(52,152,219,.3); }
  .badge-todo, .badge-to-do, .badge-pending, .badge-open, .badge-not-started { background: rgba(155,89,182,.15); color: var(--purple); border: 1px solid rgba(155,89,182,.3); }
  .badge-blocked, .badge-hold, .badge-on-hold { background: rgba(231,76,60,.15); color: var(--red); border: 1px solid rgba(231,76,60,.3); }
  .badge-high { background: rgba(224,92,42,.15); color: var(--accent2); border: 1px solid rgba(224,92,42,.3); }
  .badge-medium { background: rgba(240,165,0,.15); color: var(--accent); border: 1px solid rgba(240,165,0,.3); }
  .badge-low { background: rgba(90,96,112,.15); color: var(--muted); border: 1px solid rgba(90,96,112,.2); }
  .badge-critical { background: rgba(231,76,60,.25); color: #ff6b6b; border: 1px solid rgba(231,76,60,.5); }
  .badge-default { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .overdue-row td:first-child { border-left: 2px solid var(--red); }
  .due-soon-row td:first-child { border-left: 2px solid var(--accent); }

  .table-footer {
    padding: 12px 24px; border-top: 1px solid var(--border);
    font-size: .7rem; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    main { padding: 20px 16px 40px; }
    .page-title { font-size: 1.4rem; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Project Command
  </div>
  <div class="header-right">
    <span id="last-updated">Fetching data…</span>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="page-title">Project Dashboard</div>
  <div class="page-sub" id="sheet-label">Live · Google Sheets</div>

  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Connecting to your sheet…</div>
  </div>

  <div id="error-box"></div>
  <div id="dashboard"></div>
</main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '1IDx9kKaxx3nZaeRmJsqBycnL6LBNTMcdCUmGOv7JMfM';
const SHEET_NAME = '';  // leave blank for first sheet

// ── COLOUR PALETTE FOR CHARTS ───────────────────────────────────────────────
const PALETTE = [
  '#f0a500','#e05c2a','#3498db','#2ecc71',
  '#9b59b6','#1abc9c','#e74c3c','#f39c12',
  '#16a085','#8e44ad','#2980b9','#27ae60'
];

// ── STATE ────────────────────────────────────────────────────────────────────
let allRows = [], headers = [], sortCol = -1, sortAsc = true;
let filterStatus = '', filterPriority = '', filterAssignee = '', searchQ = '';
let charts = {};

// ── COLUMN DETECTION ─────────────────────────────────────────────────────────
function detectCol(names) {
  const lower = headers.map(h => h.toLowerCase().replace(/[\s_-]/g,''));
  for (const n of names) {
    const idx = lower.indexOf(n.toLowerCase().replace(/[\s_-]/g,''));
    if (idx !== -1) return idx;
  }
  return -1;
}

// ── FETCH DATA ────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json${SHEET_NAME ? '&sheet='+encodeURIComponent(SHEET_NAME) : ''}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}')+1));
    parseGviz(json);
  } catch(e) {
    showError(e.message);
  }
}

function parseGviz(json) {
  const table = json.table;
  if (!table || !table.cols) { showError('No data found. Make sure the sheet is shared publicly (Anyone with the link → Viewer).'); return; }

  headers = table.cols.map(c => c.label || c.id || '');
  allRows = (table.rows || []).map(r =>
    (r.c || []).map(cell => {
      if (!cell) return '';
      if (cell.f) return cell.f;     // formatted value (dates come nicely)
      if (cell.v === null || cell.v === undefined) return '';
      return String(cell.v);
    })
  ).filter(r => r.some(c => c !== ''));

  if (allRows.length === 0) { showError('Sheet appears to be empty.'); return; }

  document.getElementById('loader').style.display = 'none';
  document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  renderDashboard();
}

function showError(msg) {
  document.getElementById('loader').style.display = 'none';
  const eb = document.getElementById('error-box');
  eb.innerHTML = `⚠ Could not load data: <strong>${msg}</strong><br><br>
    Make sure the Google Sheet is set to <em>"Anyone with the link → Viewer"</em>.<br>
    Sheet ID used: <code>${SHEET_ID}</code>`;
  eb.style.display = 'block';
}

// ── RENDER DASHBOARD ──────────────────────────────────────────────────────────
function renderDashboard() {
  // Detect key columns
  const iStatus    = detectCol(['status','state','stage','progress']);
  const iPriority  = detectCol(['priority','urgency','severity','importance']);
  const iAssignee  = detectCol(['assignee','assigned','owner','responsible','team member','person']);
  const iDueDate   = detectCol(['due date','due','deadline','end date','target date','finish date']);
  const iTask      = detectCol(['task','title','name','item','description','work item','task name','project']);
  const iID        = detectCol(['id','#','no','number','task id','ticket']);

  // Count by status
  const statusCounts = {}, priorityCounts = {}, assigneeCounts = {};
  let doneCount = 0, inProgressCount = 0, todoCount = 0, overdueCount = 0, highCount = 0;
  const today = new Date(); today.setHours(0,0,0,0);

  allRows.forEach(row => {
    const st  = iStatus   >= 0 ? (row[iStatus]   || '').trim() : '';
    const pri = iPriority >= 0 ? (row[iPriority]  || '').trim() : '';
    const ass = iAssignee >= 0 ? (row[iAssignee]  || '').trim() : '';
    const due = iDueDate  >= 0 ? (row[iDueDate]   || '').trim() : '';

    if (st)  statusCounts[st]  = (statusCounts[st]  || 0) + 1;
    if (pri) priorityCounts[pri] = (priorityCounts[pri]||0) + 1;
    if (ass) assigneeCounts[ass] = (assigneeCounts[ass]||0) + 1;

    const stL = st.toLowerCase().replace(/[\s_-]/g,'');
    if (['done','complete','completed','closed','resolved','finished'].includes(stL)) doneCount++;
    else if (['inprogress','active','ongoing','inreview'].includes(stL)) inProgressCount++;
    else todoCount++;

    if (due) {
      const d = new Date(due); 
      if (!isNaN(d)) {
        d.setHours(0,0,0,0);
        const stLow = st.toLowerCase().replace(/[\s_-]/g,'');
        if (d < today && !['done','complete','completed','closed','resolved','finished'].includes(stLow)) overdueCount++;
      }
    }

    const priL = pri.toLowerCase();
    if (priL === 'high' || priL === 'critical') highCount++;
  });

  const total = allRows.length;
  const donePct = total > 0 ? Math.round(doneCount/total*100) : 0;

  // Collect unique filter values
  const uniqueStatuses  = Object.keys(statusCounts).filter(Boolean).sort();
  const uniquePriorities= Object.keys(priorityCounts).filter(Boolean).sort();
  const uniqueAssignees = Object.keys(assigneeCounts).filter(Boolean).sort();

  const dash = document.getElementById('dashboard');
  dash.innerHTML = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card total">  <div class="kpi-label">Total Tasks</div>    <div class="kpi-value">${total}</div></div>
      <div class="kpi-card done">   <div class="kpi-label">Completed</div>      <div class="kpi-value">${doneCount}</div></div>
      <div class="kpi-card progress"><div class="kpi-label">In Progress</div>   <div class="kpi-value">${inProgressCount}</div></div>
      <div class="kpi-card todo">   <div class="kpi-label">To Do</div>          <div class="kpi-value">${todoCount}</div></div>
      <div class="kpi-card overdue"><div class="kpi-label">Overdue</div>        <div class="kpi-value">${overdueCount}</div></div>
      <div class="kpi-card high">   <div class="kpi-label">High Priority</div>  <div class="kpi-value">${highCount}</div></div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-section">
      <div class="progress-header">
        <div class="progress-title">Overall Completion</div>
        <div class="progress-pct" id="prog-pct">0%</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>

    <!-- CHARTS -->
    <div class="charts-grid">
      ${Object.keys(statusCounts).length ? `
      <div class="chart-card">
        <div class="chart-title">Tasks by Status</div>
        <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
      </div>` : ''}
      ${Object.keys(priorityCounts).length ? `
      <div class="chart-card">
        <div class="chart-title">Tasks by Priority</div>
        <div class="chart-wrap"><canvas id="chart-priority"></canvas></div>
      </div>` : ''}
      ${Object.keys(assigneeCounts).length ? `
      <div class="chart-card">
        <div class="chart-title">Workload by Assignee</div>
        <div class="chart-wrap"><canvas id="chart-assignee"></canvas></div>
      </div>` : ''}
    </div>

    <!-- TABLE -->
    <div class="table-section">
      <div class="table-header">
        <div class="table-title">All Tasks</div>
        <div class="table-controls">
          <input id="search-input" type="text" placeholder="🔍 Search…" oninput="applyFilters()"/>
          ${uniqueStatuses.length ? `<select class="filter-select" id="f-status" onchange="applyFilters()">
            <option value="">All Statuses</option>
            ${uniqueStatuses.map(s=>`<option>${s}</option>`).join('')}
          </select>` : ''}
          ${uniquePriorities.length ? `<select class="filter-select" id="f-priority" onchange="applyFilters()">
            <option value="">All Priorities</option>
            ${uniquePriorities.map(s=>`<option>${s}</option>`).join('')}
          </select>` : ''}
          ${uniqueAssignees.length ? `<select class="filter-select" id="f-assignee" onchange="applyFilters()">
            <option value="">All Assignees</option>
            ${uniqueAssignees.map(s=>`<option>${s}</option>`).join('')}
          </select>` : ''}
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="table-footer">
        <span id="row-count"></span>
        <span style="color:var(--muted);font-size:.65rem;">
          <span style="color:var(--red)">■</span> Overdue &nbsp;
          <span style="color:var(--accent)">■</span> Due within 3 days
        </span>
      </div>
    </div>
  `;

  dash.style.display = 'block';

  // Animate progress bar
  setTimeout(() => {
    document.getElementById('prog-fill').style.width = donePct + '%';
    document.getElementById('prog-pct').textContent = donePct + '%';
  }, 100);

  // Render charts
  renderCharts(statusCounts, priorityCounts, assigneeCounts);

  // Render table headers
  const thead = document.getElementById('table-head');
  const headerRow = document.createElement('tr');
  headers.forEach((h, i) => {
    if (!h) return;
    const th = document.createElement('th');
    th.innerHTML = h + ' <span class="sort-icon">↕</span>';
    th.dataset.col = i;
    th.onclick = () => sortTable(i, th);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);

  // Store column indices for table row rendering
  window._cols = { iStatus, iPriority, iAssignee, iDueDate };
  applyFilters();
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function renderCharts(statusCounts, priorityCounts, assigneeCounts) {
  const chartDefaults = {
    plugins: { legend: { labels: { color: '#8a9ab0', font: { family: "'Space Mono'" }, boxWidth: 12 } } },
    scales:  {}
  };
  const barScales = {
    x: { ticks: { color: '#8a9ab0', font: { size: 10 } }, grid: { color: '#252933' } },
    y: { ticks: { color: '#8a9ab0', font: { size: 10 } }, grid: { color: '#252933' } }
  };

  if (document.getElementById('chart-status')) {
    if (charts.status) charts.status.destroy();
    charts.status = new Chart('chart-status', {
      type: 'doughnut',
      data: {
        labels: Object.keys(statusCounts),
        datasets: [{ data: Object.values(statusCounts), backgroundColor: PALETTE, borderWidth: 0, hoverOffset: 6 }]
      },
      options: { ...chartDefaults, cutout: '65%', animation: { animateRotate: true } }
    });
  }

  if (document.getElementById('chart-priority')) {
    if (charts.priority) charts.priority.destroy();
    charts.priority = new Chart('chart-priority', {
      type: 'bar',
      data: {
        labels: Object.keys(priorityCounts),
        datasets: [{ data: Object.values(priorityCounts), backgroundColor: PALETTE, borderRadius: 4, borderSkipped: false }]
      },
      options: { ...chartDefaults, plugins: { legend: { display: false } }, scales: barScales, indexAxis: 'y' }
    });
  }

  if (document.getElementById('chart-assignee')) {
    const aKeys = Object.keys(assigneeCounts).slice(0,10);
    const aVals = aKeys.map(k => assigneeCounts[k]);
    if (charts.assignee) charts.assignee.destroy();
    charts.assignee = new Chart('chart-assignee', {
      type: 'bar',
      data: {
        labels: aKeys,
        datasets: [{ data: aVals, backgroundColor: PALETTE, borderRadius: 4, borderSkipped: false }]
      },
      options: { ...chartDefaults, plugins: { legend: { display: false } }, scales: barScales, indexAxis: 'y' }
    });
  }
}

// ── TABLE FILTER + SORT ───────────────────────────────────────────────────────
function applyFilters() {
  filterStatus   = (document.getElementById('f-status')   || {}).value || '';
  filterPriority = (document.getElementById('f-priority') || {}).value || '';
  filterAssignee = (document.getElementById('f-assignee') || {}).value || '';
  searchQ        = (document.getElementById('search-input')|| {}).value?.toLowerCase() || '';
  renderTable();
}

function sortTable(colIdx, thEl) {
  if (sortCol === colIdx) sortAsc = !sortAsc;
  else { sortCol = colIdx; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
  if (thEl) {
    thEl.classList.add('sorted');
    thEl.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
  }
  renderTable();
}

function renderTable() {
  const { iStatus, iPriority, iAssignee, iDueDate } = window._cols || {};
  const today = new Date(); today.setHours(0,0,0,0);
  const in3 = new Date(today); in3.setDate(in3.getDate()+3);

  let rows = allRows.filter(row => {
    const st  = iStatus   >= 0 ? row[iStatus]   : '';
    const pri = iPriority >= 0 ? row[iPriority]  : '';
    const ass = iAssignee >= 0 ? row[iAssignee]  : '';
    if (filterStatus   && st  !== filterStatus)   return false;
    if (filterPriority && pri !== filterPriority) return false;
    if (filterAssignee && ass !== filterAssignee) return false;
    if (searchQ && !row.join(' ').toLowerCase().includes(searchQ)) return false;
    return true;
  });

  if (sortCol >= 0) {
    rows = [...rows].sort((a, b) => {
      const va = a[sortCol] || '', vb = b[sortCol] || '';
      const na = parseFloat(va), nb = parseFloat(vb);
      const cmp = (!isNaN(na) && !isNaN(nb)) ? na-nb : va.localeCompare(vb);
      return sortAsc ? cmp : -cmp;
    });
  }

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  rows.forEach(row => {
    const tr = document.createElement('tr');
    const due = iDueDate >= 0 ? row[iDueDate] : '';
    const st  = iStatus  >= 0 ? row[iStatus]  : '';
    const stL = st.toLowerCase().replace(/[\s_-]/g,'');
    const isDone = ['done','complete','completed','closed','resolved','finished'].includes(stL);
    if (due && !isDone) {
      const d = new Date(due); d.setHours(0,0,0,0);
      if (!isNaN(d)) {
        if (d < today) tr.classList.add('overdue-row');
        else if (d <= in3) tr.classList.add('due-soon-row');
      }
    }

    headers.forEach((h, i) => {
      if (!h) return;
      const td = document.createElement('td');
      const val = row[i] || '';
      const hl = h.toLowerCase().replace(/[\s_-]/g,'');
      if (hl === 'status' || hl === 'state' || hl === 'stage') {
        td.innerHTML = badge(val);
      } else if (hl === 'priority' || hl === 'urgency') {
        td.innerHTML = badge(val, true);
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  const rc = document.getElementById('row-count');
  if (rc) rc.textContent = `Showing ${rows.length} of ${allRows.length} tasks`;
}

function badge(val, isPriority = false) {
  if (!val) return '';
  const key = val.toLowerCase().replace(/[\s_-]/g,'');
  return `<span class="badge badge-${key}">${val}</span>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
// Auto-refresh every 2 minutes
setInterval(loadData, 120000);
</script>
